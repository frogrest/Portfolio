<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Food-Ordering Chatbot</title>
  <style>
    :root{
      --bg1:#f7f7ff;
      --bg2:#eefcff;
      --text:#0f172a;
      --muted:#475569;
      --bot:#eef2f7;
      --user:#2563eb;
      --accent:#0b1220;
      --border:rgba(15,23,42,.12);
      --shadow: 0 18px 40px rgba(2,6,23,.18);
      --shadow2: 0 8px 22px rgba(2,6,23,.12);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      min-height:100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      overflow-x:hidden;
    }

    .page-mock{
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 18px 160px;
    }
    .page-mock h1{
      margin:0 0 14px;
      letter-spacing:-.02em;
      font-size: clamp(26px, 3vw, 42px);
    }
    .page-mock p{
      margin:0 0 26px;
      color:var(--muted);
      line-height:1.7;
      max-width: 62ch;
    }

    /* Chat widget */
    .chat-widget{
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
    }

    .chat-toggle{
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.3);
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: #fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: var(--shadow2);
      cursor:pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      user-select:none;
    }
    .chat-toggle:active{ transform: translateY(1px) scale(.99); }

    .chat-window{
      width: min(380px, calc(100vw - 36px));
      height: min(560px, calc(100vh - 120px));
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transform-origin: bottom right;
      display:none;
      flex-direction:column;
    }
    .chat-window.open{ display:flex; }

    .chat-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 14px 14px;
      background: linear-gradient(180deg, rgba(37,99,235,.10), rgba(37,99,235,.04));
      border-bottom: 1px solid var(--border);
    }
    .chat-header .title{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }
    .chat-badge{
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(37,99,235,.18), rgba(37,99,235,.06));
      border: 1px solid rgba(37,99,235,.25);
      display:flex;
      align-items:center;
      justify-content:center;
      color: #1d4ed8;
      font-weight: 900;
    }
    .chat-header h2{
      margin:0;
      font-size: 14px;
      letter-spacing:.02em;
      color: var(--accent);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .chat-close{
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color: var(--muted);
      transition: background .15s ease, transform .15s ease;
    }
    .chat-close:active{ transform: translateY(1px); }

    .chat-messages{
      padding: 14px 12px;
      flex: 1;
      overflow:auto;
      background:
        radial-gradient(circle at 20% 0%, rgba(37,99,235,.06), transparent 40%),
        radial-gradient(circle at 80% 10%, rgba(2,6,23,.06), transparent 40%);
    }

    .msg-row{
      display:flex;
      margin: 10px 0;
    }
    .msg-row.bot{ justify-content:flex-start; }
    .msg-row.user{ justify-content:flex-end; }

    .bubble{
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 14px;
      line-height:1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bot .bubble{
      background: var(--bot);
      border-top-left-radius: 6px;
      color: #0f172a;
    }
    .user .bubble{
      background: var(--user);
      border-color: rgba(37,99,235,.35);
      border-top-right-radius: 6px;
      color:#fff;
    }

    .chat-footer{
      padding: 12px;
      border-top: 1px solid var(--border);
      background: #fff;
      display:flex;
      gap: 10px;
      align-items:center;
    }

    .chat-input{
      flex:1;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      transition: box-shadow .15s ease, border-color .15s ease;
    }
    .chat-input:focus{
      border-color: rgba(37,99,235,.45);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .send-btn{
      border: 1px solid rgba(37,99,235,.35);
      background: #2563eb;
      color: #fff;
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor:pointer;
      transition: transform .15s ease;
      white-space:nowrap;
    }
    .send-btn:active{ transform: translateY(1px); }
    .send-btn:disabled{ opacity:.6; cursor:not-allowed; }

    @media (max-width: 420px){
      .chat-widget{ right: 12px; bottom: 12px; }
      .chat-footer{ padding: 10px; }
      .bubble{ max-width: 86%; }
    }
  </style>
</head>
<body>
  <div class="page-mock">
    <h1>Restaurant Chatbot Prototype</h1>
    <p>Use the floating chat widget in the bottom-right corner to place a test order.</p>
    <p>Type the name of the food and the chatbot will add it to your order.</p>
  </div>

  <div class="chat-widget" aria-label="Restaurant ordering chatbot">
    <button class="chat-toggle" id="chatToggle" type="button" aria-expanded="false" aria-controls="chatWindow" title="Open chat">
      <span aria-hidden="true">🍽️</span>
    </button>

    <div class="chat-window" id="chatWindow" role="dialog" aria-modal="false" aria-labelledby="chatTitle">
      <div class="chat-header">
        <div class="title">
          <div class="chat-badge" aria-hidden="true">R</div>
          <h2 id="chatTitle">Gian’s Kitchen</h2>
        </div>
        <button class="chat-close" id="chatClose" type="button" aria-label="Close chat" title="Close">✕</button>
      </div>

      <div class="chat-messages" id="chatMessages" aria-live="polite"></div>

      <div class="chat-footer">
        <input class="chat-input" id="chatInput" type="text" autocomplete="off" placeholder="Type a message..." />
        <button class="send-btn" id="sendBtn" type="button">Send</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const RESTAURANT_NAME = "Cheian's Kitchen";

      const categories = {
        appetizers: [
          { id: 1, name: "Garlic Bread", price: 5 },
          { id: 2, name: "Bruschetta", price: 7 },
          { id: 3, name: "Mozzarella Sticks", price: 8 }
        ],
        mains: [
          { id: 1, name: "Burger", price: 10 },
          { id: 2, name: "Pizza", price: 12 },
          { id: 3, name: "Pasta Alfredo", price: 13 }
        ],
        drinks: [
          { id: 1, name: "Iced Tea", price: 3 },
          { id: 2, name: "Soda", price: 4 },
          { id: 3, name: "Lemonade", price: 5 }
        ]
      };

      const categoryAliases = {
        "1": "appetizers",
        "2": "mains",
        "3": "drinks",
        appetizer: "appetizers",
        appetizers: "appetizers",
        starter: "appetizers",
        starters: "appetizers",
        main: "mains",
        mains: "mains",
        entree: "mains",
        entrees: "mains",
        drink: "drinks",
        drinks: "drinks",
        beverage: "drinks"
      };

      const itemIndex = new Map();
      for (const [catKey, items] of Object.entries(categories)){
        for (const item of items){
          itemIndex.set(String(item.id).toLowerCase() + "|" + catKey, item);
          itemIndex.set(item.name.toLowerCase(), item);
        }
      }

      const chatToggle = document.getElementById('chatToggle');
      const chatWindow = document.getElementById('chatWindow');
      const chatClose = document.getElementById('chatClose');
      const chatMessages = document.getElementById('chatMessages');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');

      let cart = []; // array of {name, price}
      let lastOfferedCategory = null;

      const STATE = { START: 'start', SHOPPING: 'shopping' };
      let state = STATE.START;

      function normalize(s){
        return (s || '').trim().toLowerCase();
      }

      function escapeHtml(str){
        return String(str).replace(/[&<>"']/g, function(ch){
          switch(ch){
            case "&": return "&amp;";
            case "<": return "<";
            case ">": return ">";
            case '"': return "&quot;";
            case "'": return "&#039;";
            default: return ch;
          }
        });
      }

      function addMessage(text, role){
        const row = document.createElement('div');
        row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = escapeHtml(text);
        row.appendChild(bubble);
        chatMessages.appendChild(row);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function botGreeting(){
        addMessage(
          `Welcome to ${RESTAURANT_NAME}! How can I help you today? Type 'menu' to see our categories.`,
          'bot'
        );
      }

      function botCategories(){
        addMessage(
          "Here are our categories:\n1. Appetizers, 2. Mains, 3. Drinks",
          'bot'
        );
        
      }

      function botCategoryItems(catKey){
        const items = categories[catKey] || [];
        if(!items.length){
          addMessage("I don’t have items for that category yet. Try typing 'menu'.", 'bot');
          return;
        }
        const pretty = catKey.charAt(0).toUpperCase() + catKey.slice(1);
        const parts = items.map(i => `${i.id}. ${i.name} - $${i.price}`);
        addMessage(`${pretty}: ${parts.join(', ')}`, 'bot');
      }

      function botAdded(itemName){
        addMessage(`${itemName} added to your order! Type 'menu' to add more, or 'checkout' to finish.`, 'bot');
      }

      function botCheckout(){
        const total = cart.reduce((sum, i) => sum + i.price, 0);
        addMessage(`Your total is $${total}. Thank you for your order! It will be ready in 20 minutes.`, 'bot');
      }

      function botFallback(){
        addMessage("I'm sorry, I didn't catch that. Try typing 'menu' or 'checkout'.", 'bot');
      }

      function listItemsForCategoryInput(userInput){
        const key = categoryAliases[userInput] || null;
        if(!key) return null;
        lastOfferedCategory = key;
        return key;
      }

      function tryAddItemFromInput(userInput){
        const asNumber = userInput.match(/^\d+$/) ? Number(userInput) : null;

        if(asNumber !== null){
          // Prefer within last offered category
          if(lastOfferedCategory && categories[lastOfferedCategory]){
            const match = categories[lastOfferedCategory].find(i => i.id === asNumber);
            if(match){
              cart.push({ name: match.name, price: match.price });
              return match;
            }
          }
          // Fallback search across categories
          for(const items of Object.values(categories)){
            const match = items.find(i => i.id === asNumber);
            if(match){
              cart.push({ name: match.name, price: match.price });
              return match;
            }
          }
        }

        // Item name exact
        const exact = itemIndex.get(userInput);
        if(exact){
          cart.push({ name: exact.name, price: exact.price });
          return exact;
        }

        // Loose contains match
        for(const items of Object.values(categories)){
          for(const item of items){
            const n = item.name.toLowerCase();
            if(n.includes(userInput) || userInput.includes(n)){
              cart.push({ name: item.name, price: item.price });
              return item;
            }
          }
        }

        return null;
      }

      function handleUserText(raw){
        const text = normalize(raw);
        if(!text) return;

        addMessage(raw, 'user');

        if(text === 'menu'){
          state = STATE.SHOPPING;
          botCategories();
          return;
        }

        if(text === 'checkout'){
          botCheckout();
          cart = [];
          lastOfferedCategory = null;
          state = STATE.START;
          setTimeout(botGreeting, 350);
          return;
        }

        const catKey = listItemsForCategoryInput(text);
        if(catKey){
          state = STATE.SHOPPING;
          botCategoryItems(catKey);
          return;
        }

        const added = tryAddItemFromInput(text);
        if(added){
          state = STATE.SHOPPING;
          botAdded(added.name);
          return;
        }

        botFallback();
      }

      function openChat(){
        chatWindow.classList.add('open');
        chatToggle.setAttribute('aria-expanded', 'true');
        chatInput.focus();
        if(state === STATE.START && chatMessages.children.length === 0){
          botGreeting();
        }
      }

      function closeChat(){
        chatWindow.classList.remove('open');
        chatToggle.setAttribute('aria-expanded', 'false');
      }

      function send(){
        const val = chatInput.value;
        if(!val) return;
        chatInput.value = '';
        sendBtn.disabled = true;
        try{
          handleUserText(val);
        } finally {
          sendBtn.disabled = false;
          chatInput.focus();
        }
      }

      chatToggle.addEventListener('click', function(){
        if(chatWindow.classList.contains('open')) closeChat();
        else openChat();
      });

      chatClose.addEventListener('click', closeChat);
      sendBtn.addEventListener('click', send);
      chatInput.addEventListener('keydown', function(e){
        if(e.key === 'Enter') send();
      });

      state = STATE.START;
    })();
  </script>
</body>
</html>
